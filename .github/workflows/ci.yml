name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
          cache: "pip"
      - name: Install system dependencies for pygraphviz
        run: sudo apt-get install -y graphviz libgraphviz-dev
      - name: Install runtime requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install dev extras
        run: pip install -r requirements-dev.txt
      - name: Run Ruff (lint)
        run: ruff check eda_schema tests
      - name: Run tests
        run: pytest
  docs:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
          cache: "pip"
      - name: Install docs deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Build docs
        working-directory: docs
        run: make html
